name: Build macOS App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14  # arm64 runner

    permissions:
      contents: write  # required to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build and package
        run: pnpm build && pnpm -w run package:mac

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Open Query v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            **macOS arm64 build** from commit ${{ github.sha }}

            ### Install
            1. Download `Open.Query-${{ steps.version.outputs.version }}-arm64.dmg`
            2. Open the DMG and drag **Open Query** to Applications
            3. Right-click → Open on first launch (unsigned app)
          files: |
            apps/electron/build/*.dmg
            apps/electron/build/*.zip
          make_latest: true
