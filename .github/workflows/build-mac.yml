name: Build macOS App

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14  # arm64 runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build and package
        run: pnpm build && pnpm -w run package:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Open-Query-${{ github.sha }}-arm64
          path: |
            apps/electron/build/*.dmg
            apps/electron/build/*.zip
          retention-days: 30
